7.86s13.968-2.792 19.032-7.86L382.678 265c5.076-5.084 7.864-11.872 7.848-19.088.016-7.244-2.772-14.028-7.848-19.108z"></path></svg></div></div></div></section></div><!--]--><!--]--><!--]--></div><div id="teleports"></div><script type="application/json" data-nuxt-data="nuxt-app" data-ssr="true" id="__NUXT_DATA__">[["ShallowReactive",1],{"data":2,"state":28,"once":43,"_errors":44,"serverRendered":16,"path":46,"pinia":47},["ShallowReactive",3],{"$apiPartyjW0QoGLd8v":4,"$apiPartygNJmORHQxh":17},{"_data":5,"_extra":10,"_messages":10,"_status":15,"_success":16},{"author":6,"author_id":7,"bookmark_count":7,"chapter_count":7,"chapter_created_at":9,"comment_count":7,"created_at":9,"genres":10,"id":11,"image":12,"origin_language":7,"publisher":7,"rating":7,"review_count":7,"slug":13,"status":7,"synopsis":8,"tags":10,"title":14,"updated_at":9,"views_all":7,"views_day":7,"views_month":7,"views_week":7,"word_count":7},{"id":7,"name":8,"raw":8,"slug":8},0,"","0001-01-01T00:00:00Z",null,105897,"novel_covers/3669261198.png","global-beast-taming","Global Beast Taming",200,true,{"_data":18,"_extra":24,"_messages":10,"_status":7,"_success":27},{"id":19,"slug":20,"title":21,"content":22,"novel_id":11,"index":23,"word_count":7,"comment_count":7,"image":8},5810819,"chapter-001-young-chu-yun","Chapter 001: Young Chu Yun","The dilapidated buildings were covered with all kinds of dense vines; shabby abandoned cars were squeezed into the mud covered with weeds and vegetation everywhere.\nThe streets that should have been bustling and prosperous are now in ruins and desolate.\nThe sky was dark and fine raindrops were falling.\nThe hazy drizzle slapped on Chu Yun's face in small pieces, and his body, lying in the dense grass, was half soaked in the rain.\nNext to him, lying quietly was a net bag made of tough steel wire!\nDespite the cold rain, Chu Yun lay there motionless.\nThe cold rain slid down his eyes, but he didn't even blink.\nHis eyes were focused and his gaze was determined as he looked in the direction a few meters ahead.\nThere, hundreds of blue butterflies, each the size of his fist, danced in the falling rain.\nIn the rain, the frolicking blue butterflies' icy blue wings skimmed through the rain, splashing even finer water droplets that slid down.\nChu Yun lay cautiously in the grass, and every time his attention was focused on a flying blue butterfly.\nIn the void in front of his eyes, there would always be a virtual three-dimensional screen appearing, and various data of the blue butterfly would be continuously displayed on it.\n[Name: (Cannot be named if not captured!)]\n[Fantasy Pet Race: Zerg - Rain Butterfly]\n[Gender: Female]\n[Talent: Affinity with Water Element]\nBlank! Still a blank! Chu Yun clenched his fists in frustration.\nThis is a secret that belongs to him alone!\nIn this world dominated by pets, he could transform any pet data he saw into an attribute panel like the one in the game of his previous life.\nYes, Chu Yun does not belong to this world!\nTen days ago, when he regained consciousness, he found himself traveling to another Earth that was almost the same as his previous life.\nHowever, compared to the previous world with prosperous technology and advanced social civilization, this world is 70% similar to the Earth in the previous life.\nBut one night sixteen years ago, something else happened.\nMarch 18, 2010, night.\nThe alien space is coming.\nCountless space channels suddenly opened up all over the world.\nFierce and brutal beasts appeared, and even more so, strange people were rampant!\nThat year, that day, Chu Yun's predecessor was born.\nIt was also on that day that the entire human race on Earth fell into panic. In just over ten days, the original human population of nearly 7 billion was reduced to 7 billion.\nReduced to less than 2 billion!\nThat year was a world full of nightmares, but also a world full of opportunities!\nApril 22, 2010.\nThe first human on Earth awakened his talent, accidentally discovered a contracted ferocious beast, and began his journey to becoming a fantasy pet master!\nIn the next five years, powerful humans who contracted ferocious beasts and became illusion pet masters continued to emerge from all over the world!\nAfter five years of war, the strong men of humanity rebuilt a new order.\nNew human habitats have been recreated all over the world - [Base City]!\nAfter more than ten years of development and resistance, mankind gradually regained its foothold on the earth.\nThe body that Chu Yun traveled through time and was reborn into is in the only base city in the original Huaxia Nanhai Province - [Hailong Base City]!\n......\nRainy weather is the favorite environment for the lowest-level fantasy pet - Rain Butterfly.\nIf you want to catch them, the chances are greatest at this time.\nUnfortunately, for several days in a row, Chu Yun had been lurking in several areas where rain butterflies appeared.\nIt was simply impossible to find a Rain Butterfly with excellent talents. All the Rain Butterflies detected by the panel were blank attributes with only exclusive talents!\nThere isn't even any blood factor that can evolve!\nAfter a few days of disappointment, Chu Yun was about to give up.\n\"This won't work! If I can't find a satisfactory fantasy pet among these Rain Butterflies, I'll have to consider signing a contract with another fantasy pet species!\"\nChu Yun looked at the rain butterflies dancing happily in the rain in front of him with some bitterness.\nAfter more than ten years of development and research, human researchers have discovered that 16 years old is the best age for humans to contract ferocious beasts and become a fantasy pet master!\nHumans of this age group, when they contract a ferocious beast and become official phantom pet masters, have the greatest chance of unleashing the potential of their first contracted phantom pet!\nThat is to say, if he is lucky, as long as he successfully contracts a fantasy pet, he will have a great chance of evolving that fantasy pet directly into one of its subsequent evolutionary sequences!\nIn other words, he will get a powerful phantom pet in one step!\nThis kind of talent is also the only and uncontrollable racial talent of human beings on earth!\nHowever, the evolution of this racial talent does not always work.\nFor example, some people are less lucky and fail to activate this racial talent!\nEven if one is lucky enough to stimulate the racial talent, the ferocious beast that one has contracted does not have the blood factors that can lead to evolution.\nThen even if the human being, as the master, has powerful racial talents, he can only waste this opportunity in vain!\nIn addition to racial talents, 16-year-old humans will also develop their own unique talents at this age!\nCompared to other humans, who had to blindly make contracts with ferocious beasts like drawing a lottery to become a fantasy pet master, Chu Yun, who traveled through time and space, was relatively lucky!\nIt might be because he was already an adult before he traveled through time and space, and when he woke up in this world, his unique personal talents had already been activated!\n[Unique Talent: Digital Panel]!\n[Description: All the fantasy pets you see can be presented with digitized attributes.]\nThis explanation was so simple and direct that Chu Yun was a little confused.\n......\nOne more day!\nTomorrow is the 16th birthday of this body of his, and that will be the most appropriate time for him to contract a fantasy pet!\nThinking of this, Chu Yun shook off the distracting thoughts in his mind.\nHe continued to look towards the group of rain butterflies in front of him with bright eyes, screening the remaining rain butterfly talents.\nWhiteboard!\nWhiteboard!\nStill a whiteboard!\nFour talents? ! Wait! !\nSuddenly, Chu Yun's eyes widened and he looked in disbelief at a skinny rain butterfly in the corner of the rain butterfly colony.\nIt is so thin. Among the dancing rain butterflies, it looks like the weakest and most pitiful one, flapping its not-so-bright blue wings.\nAt the edge of the butterfly group, it tried hard to be with the other companions in the group, but every time, it was squeezed out by the more powerful companions and fell to the very edge.\nA three-dimensional virtual panel appeared in front of him:\n[Name: (Cannot be named if not captured!)]\n[Fantasy Pet Race: Zerg - Rain Butterfly]\n[Gender: Female]\n[Talents: Affinity with water elements, spiritual blessing, perseverance, evolution! ]\n\"Hiss~! Born with four talents?!\"\nEven Chu Yun, who is usually calm and composed, was stunned by the gorgeous attribute panel of this rain butterfly!",1,{"_block":10,"_pagination":25},{"prev":8,"next":26},"chapter-002-capturing-a-fantasy-pet-a-different-16-years-old",false,["Reactive",29],{"$snuxt-i18n-meta":30,"$scolor-mode":31,"$snuxt-delay-hydration-mode":33,"$snuxt-seo-utils:routeRules":34,"$ssite-config":35},{},{"preference":32,"value":32,"unknown":16,"forced":27},"dark","mount",{"head":-1,"seoMeta":-1},{"_priority":36,"currentLocale":40,"defaultLocale":40,"env":41,"name":27,"trailingSlash":27,"url":42},{"name":37,"env":38,"url":37,"defaultLocale":39,"trailingSlash":37,"currentLocale":39},-3,-15,-2,"en-US","production","https://fictionzone.net",["Set"],["ShallowReactive",45],{"$apiPartyjW0QoGLd8v":-1,"$apiPartygNJmORHQxh":-1},"/novel/global-beast-taming/chapter-001-young-chu-yun",{"auth":48},{"authenticated":16,"loading":27,"user":49},{"id":50,"username":51,"bio":52,"image":8,"review_count":7,"bookmark_count":7,"is_active":16,"is_banned":27},383001,"musyonchez","N/A"]</script><script>window.__NUXT__={};window.__NUXT__.config={public:{turnstile:{siteKey:"0x4AAAAAAAZ01-whV0-9TWvs"},device:{defaultUserAgent:"Mozilla/5.0 (Macintosh; Intel Mac OS X 10_13_2) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/64.0.3282.39 Safari/537.36",enabled:true,refreshOnResize:false},apiParty:{endpoints:{"api-v1":{cookies:""}},client:false,ser
